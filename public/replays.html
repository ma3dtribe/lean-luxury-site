<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MA3DTribe Replays</title>
</head>
<body style="background:#050505;color:white;font-family:Arial;padding:20px;">
  <h1>MA3DTribe Replays</h1>
  <p>Replay past shows below.</p>

  <div id="replayList">Loading replays...</div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://tgqfplueqjhsywkcjaal.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRncWZwbHVlcWpoc3l3a2NqYWFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5ODQ2NTAsImV4cCI6MjA4NTU2MDY1MH0.hBGfeviPVBmhtFBsn3B0GRSC_JXU6qxC3qmW-mbb9-o";

    const box = document.getElementById("replayList");
   

if (!window.supabase) {
  box.innerHTML = "Supabase library did not load.";
  throw new Error("Supabase library did not load");
}


const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function trackReplayView(show) {
  await supabase.from("replay_views").insert({
    replay_id: String(show.id),
    replay_title: show.title || "",
    user_agent: navigator.userAgent
  });
}    
    async function loadReplays() {
      
      const { data, error } = await supabase
        .from("shows")
        .select("*")
        .order("id", { ascending: false });

      if (error) {
  console.log(error);
  box.innerHTML = JSON.stringify(error);
  return;
}

      if (!data || data.length === 0) {
        box.innerHTML = "No replays available yet.";
        return;
      }

      box.innerHTML = (await Promise.all(data.map(async show => {
const { count } = await supabase
  .from("replay_views")
  .select("*", { count: "exact", head: true })
  .eq("replay_id", String(show.id));        
        const thumbnail = show.thumbnail_url
  ? `<img src="${show.thumbnail_url}" alt="${show.title}" style="width:33%;max-width:260px;border-radius:12px;margin-bottom:14px;display:block;">`
  : "";

const player = show.type === "video"
  ? `<video controls data-replay-id="${show.id}" style="width:100%;max-width:800px;" src="${show.file_path}"></video>`
  : `<audio controls data-replay-id="${show.id}" style="width:100%;" src="${show.file_path}"></audio>`;

        return `
          <div style="margin:25px 0;padding:18px;border:1px solid #333;border-radius:12px;background:#111;">
            ${thumbnail}
<h2>${show.title}</h2>
<p>${show.show_date || ""}</p>
<p style="color:#aaa;font-size:14px;margin-top:6px;">
  ▶️ ${count || 0} replays
</p>
            ${player}
          </div>
        `;
      }))).join("");

document.querySelectorAll("[data-replay-id]").forEach(player => {
  player.addEventListener("play", () => {
    const show = data.find(item => String(item.id) === String(player.dataset.replayId));

    if (show && !player.dataset.tracked) {
      player.dataset.tracked = "true";
      trackReplayView(show);
    }
  });
});

}

    loadReplays().catch(error => {
  console.log(error);
  box.innerHTML = error.message || JSON.stringify(error);
});
  </script>
</body>
</html>

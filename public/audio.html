<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>MA3DTribe Audio</title>
  <link rel="apple-touch-icon" href="/icons/ma3d-192.png">
  <style>
    :root{
      --bg:#1c1718;
      --text:#f2eded;
      --muted:rgba(242,237,237,.78);
      --border:rgba(255,255,255,.12);
      --card:rgba(255,255,255,.05);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      font-family:Inter,system-ui,sans-serif;
      background:var(--bg);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .card{
      width:min(100%,520px);
      border-radius:20px;
      padding:24px;
      background:var(--card);
      border:1px solid var(--border);
      box-shadow:0 12px 40px rgba(0,0,0,.32);
      text-align:center;
    }

    .logo{
      width:100%;
      max-width:320px;
      margin:0 auto 20px;
      display:block;
    }

    h1{
      margin:0 0 10px;
      font-size:28px;
    }

    p{
      margin:0 0 18px;
      color:var(--muted);
      line-height:1.5;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:52px;
      padding:0 18px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,59,59,.16);
      color:var(--text);
      text-decoration:none;
      font-weight:800;
      margin-top:10px;
    }

    audio{
      width:100%;
      margin-top:18px;
      border-radius:12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/images/ma3dtribebanner_cropped.png" class="logo" />
    <h1>MA3DTribe Audio</h1>
    <p>Background listening mode for MA3DTribe.</p>

    <a class="btn" href="/">Back to Site</a>

    <audio id="audioPlayer" controls playsinline preload="auto"></audio>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const audio = document.getElementById("audioPlayer");
    const STREAM_URL = "https://audio.ma3dtribe.com/liveaudio/index.m3u8";
const SUPABASE_URL = "https://tgqfplueqjhsywkcjaal.supabase.co";

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRncWZwbHVlcWpoc3l3a2NqYWFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5ODQ2NTAsImV4cCI6MjA4NTU2MDY1MH0.hBGfeviPVBmhtFBsn3B0GRSC_JXU6qxC3qmW-mbb9-o";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const audioSessionId = crypto.randomUUID();

const audioSessionStart = Date.now();

let currentAudioStatId = null;

let audioDurationTimer = null;
  
    // Load stream and start audio tracking on page load
window.addEventListener("load", async () => {
  if (audio.src !== STREAM_URL) {
    audio.src = STREAM_URL;
    audio.load();
  }

  const { data, error } = await sb
    .from("audio_stats")
    .insert([{
      session_id: audioSessionId,
      duration_seconds: 0,
      last_seen: new Date().toISOString()
    }])
    .select()
    .single();

  if (data?.id) {
    currentAudioStatId = data.id;
  }

  console.log("audio_stats insert:", { data, error });
audioDurationTimer = setInterval(async () => {

  if (!audioSessionId) return;

  const seconds = Math.floor((Date.now() - audioSessionStart) / 1000);

  const { data, error } = await sb
    .from("audio_stats")
    .update({
      duration_seconds: seconds,
      last_seen: new Date().toISOString()
    })
    .eq("session_id", audioSessionId)
    .select();

  console.log("audio duration update:", { seconds, data, error });

}, 30000);

  
});

  
    // Media Session (lock screen)
    if ("mediaSession" in navigator) {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: "MA3DTribe Live",
        artist: "Live DJ Set",
        album: "MA3DTribe Radio",
        artwork: [
          { src: "/icons/ma3d-192.png", sizes: "192x192", type: "image/png" },
          { src: "/icons/ma3d-512.png", sizes: "512x512", type: "image/png" }
        ]
      });

      navigator.mediaSession.setActionHandler("play", async () => {
        try {
          if (audio.src !== STREAM_URL) {
            audio.src = STREAM_URL;
            audio.load();
          }
          await audio.play();
        } catch(e){}
      });

      navigator.mediaSession.setActionHandler("pause", () => {
        audio.pause();
      });
      
    }
window.addEventListener("beforeunload", () => {

if (!audioSessionId) return;

  const seconds = Math.floor((Date.now() - audioSessionStart) / 1000);

  navigator.sendBeacon(
    `${SUPABASE_URL}/rest/v1/audio_stats?session_id=eq.${audioSessionId}`,
    JSON.stringify({
      duration_seconds: seconds,
      last_seen: new Date().toISOString()
    })
  );
});  
  </script>
</body>
</html>

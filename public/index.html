  <style>
    :root{
      /* Red-forward music lounge palette */
      --bg: #1c1718;
      --text: #f2eded;
      --muted: rgba(242,237,237,.78);
      --border: rgba(255,255,255,.12);
      --card: rgba(255,255,255,.05);
      --card2: rgba(255,255,255,.035);
      --red: #ff3b3b;
      --red-soft: rgba(255,59,59,.18);
      --red-glow: rgba(255,59,59,.25);
      --content-max: 1100px;
      --content-pad: 16px;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* Red stage glow */
    .bg-glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(900px 380px at 14% 14%, rgba(255,59,59,.22), transparent 60%),
        radial-gradient(800px 320px at 86% 62%, rgba(180,30,30,.18), transparent 62%),
        radial-gradient(700px 280px at 50% 95%, rgba(120,10,10,.14), transparent 60%);
      z-index: -1;
      opacity: .85;
      pointer-events: none;
    }

    /* =========================
       ✅ SHARED CONTENT WIDTH (banner + main match perfectly)
    ========================= */
    .container{
      max-width: var(--content-max);
      margin: 0 auto;
      padding: 0 var(--content-pad);
    }

    /* =========================
       ✅ BANNER HEADER (matches content width + "perfect" header height)
       - Put ma3dtribebanner_cropped.webp in /public/images/
       - URL path is /images/ma3dtribebanner_cropped.webp (NO /public)
    ========================= */
    .site-banner{
      padding-top: 10px;
      padding-bottom: 10px;
    }

    .banner-img{
      width: 100%;
      height: clamp(180px, 29vw, 320px); /* "perfect" header height range */
      object-fit: contain;               /* show full banner, no cut-off */
      display: block;
      filter: drop-shadow(0 12px 28px rgba(0,0,0,.35));
    }

@media (max-width: 600px){

    height: clamp(220px, 60vw, 420px);
  }
}

    /* =========================
       Live/Offline pill + hero status line
    ========================= */
    .statusbar{
      display:flex;
      align-items:center;
      gap:12px;
      margin-top:12px;
      flex-wrap:wrap;
    }

    .status-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      font-size:12px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .status-dot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:#6b7280;
      box-shadow:none;
    }

    .status-text{
      opacity:.82;
      font-size:14px;
      line-height:1.45;
      color: var(--muted);
    }

    /* Offline state */
    #livebar[data-state="offline"] .status-dot{
      background:#6b7280;
    }

    /* Live state */
    #livebar[data-state="live"] .status-pill{
      border-color: rgba(255,59,59,.45);
      background: rgba(255,59,59,.12);
      box-shadow: 0 0 0 1px rgba(255,59,59,.10), 0 0 18px rgba(255,59,59,.14);
    }

    #livebar[data-state="live"] .status-dot{
      background: var(--red);
      box-shadow: 0 0 0 4px rgba(255,59,59,.18);
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255,59,59,.55); }
      70% { box-shadow: 0 0 0 10px rgba(255,59,59,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,59,59,0); }
    }

    /* Watch shell */
    .watch-shell {
      border-radius: 16px;

      border: 1px solid rgba(255,255,255,.14);

      box-shadow: 0 12px 40px rgba(0,0,0,.28);
      padding: 18px;
      transition: border-color .15s ease, box-shadow .15s ease;

#missionCard{
  padding:32px;
  position:relative;
  align-self:stretch;
  overflow:hidden;
  border: 1px solid rgba(255,59,59,.24);
  background:
    radial-gradient(760px 260px at 14% 10%, rgba(255,59,59,.16), transparent 58%),
    radial-gradient(540px 220px at 88% 82%, rgba(120,10,10,.14), transparent 62%),
    linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.025));
  box-shadow:
    0 0 0 1px rgba(255,59,59,.05),
    0 20px 55px rgba(0,0,0,.34);
}

#missionCard::before{
  content:"";
  position:absolute;
  inset:0 auto 0 0;
  width:4px;
  background:linear-gradient(180deg, rgba(255,59,59,.95), rgba(255,59,59,.18));
  border-radius:18px 0 0 18px;
}

#missionCard h3{
  margin:0 0 18px;
  font-size:30px;
  font-weight:900;
  line-height:1.1;
  letter-spacing:-.01em;
  position:relative;
  padding-bottom:14px;
}

#missionCard h3::after{
  content:"";
  position:absolute;
  left:0;
  bottom:0;
  width:72px;
  height:3px;
  border-radius:999px;
  background:linear-gradient(90deg, rgba(255,59,59,.95), rgba(255,59,59,.22));
  box-shadow:0 0 18px rgba(255,59,59,.28);
}

  border:1px solid rgba(255,59,59,.24);
  box-shadow:0 0 0 1px rgba(255,59,59,.04);
}

.mission-eyebrow::before{
  content:"";
  width:8px;
  height:8px;

}

.mission-text{

async function handleAudioTapLiveState(isLive) {
  const wasLive = sessionStorage.getItem(AUDIO_TAP_LAST_LIVE_STATE_KEY) === "1";

  if (isLive) {
    document.body.classList.add("live-mode");
    let session = await getCurrentAudioTapSession();

    if (!session) {
      sessionStorage.setItem(AUDIO_TAP_LAST_LIVE_STATE_KEY, "1");
      session = await ensureAudioTapSessionLive();
    } else {
      sessionStorage.setItem(AUDIO_TAP_LAST_LIVE_STATE_KEY, "1");
      updateAudioTapDisplay(session.tap_count || 0);
    }
  } else {
    if (wasLive) {
      sessionStorage.removeItem(AUDIO_TAP_LAST_LIVE_STATE_KEY);
      await endAudioTapSession();
    } else {
      updateAudioTapDisplay(0);
    }
  }
}
      
function pushWebCountToChat(count, viewers = []){
  const n = Number(count || 0);

  try {
    chatFrame?.contentWindow?.postMessage({
      type: "ma3d:webCount",
      count: n,
      viewers
    }, "*");
  } catch (e) {}

  try {
    const viewCountInFrame = chatFrame?.contentDocument?.getElementById("viewCount");
    if (viewCountInFrame) viewCountInFrame.textContent = String(n);
  } catch (e) {}
}

function recomputeWebCount(channel){
  if (!channel) return;

  const state = channel.presenceState();
  const now = Date.now();
  const STALE_MS = 120000;

  const sessions = new Map();

  for (const key in state) {
  const metas = (state[key] || []).filter(m => {
    const fresh = (now - Number(m?.t || 0)) < STALE_MS;
    const activeOnSite = m?.pageActive === true;
    const listeningInBackground = m?.streamLoaded === true;
    return fresh && (activeOnSite || listeningInBackground);
  });

  if (!metas.length) continue;

  let latest = metas[0];
  for (const m of metas) {
    if (Number(m?.t || 0) > Number(latest?.t || 0)) {
      latest = m;
    }
  }

  sessions.set(key, latest);
}

    const viewers = Array.from(sessions.values())
    .sort((a, b) => Number(b?.t || 0) - Number(a?.t || 0))
    .map(m => ({
      name: (m?.username || "Guest").toString(),
      chatted: !!m?.chatted,
      t: Number(m?.t || 0)
    }));

  pushWebCountToChat(sessions.size, viewers);
}

async function startWebPresence(){
  if (!sb) return;
  if (document.hidden) return;

  if (webPresenceChannel) {
    try { await webPresenceChannel.unsubscribe(); } catch (e) {}
    webPresenceChannel = null;
  }

  webPresenceChannel = sb.channel(`web-presence:${ROOM}`, {
    config: { presence: { key: webSessionId } }
  });

  webPresenceChannel
    .on("presence", { event: "sync" }, () => recomputeWebCount(webPresenceChannel))
    .on("presence", { event: "join" }, () => recomputeWebCount(webPresenceChannel))
    .on("presence", { event: "leave" }, () => recomputeWebCount(webPresenceChannel));

  await webPresenceChannel.subscribe(async (status) => {
    if (status !== "SUBSCRIBED") return;

        try {
      await webPresenceChannel.track({
  username: getWebsiteUsername(),
  pageActive: !document.hidden,
  streamLoaded: !!streamLoaded,
  t: Date.now()
});
    } catch (e) {}

    recomputeWebCount(webPresenceChannel);

    if (webHeartbeat) clearInterval(webHeartbeat);

            webHeartbeat = setInterval(async () => {
      try {
        await webPresenceChannel.track({
          username: getWebsiteUsername(),
          pageActive: !document.hidden,
          streamLoaded: !!streamLoaded,
          t: Date.now()
        });
        recomputeWebCount(webPresenceChannel);
      } catch (e) {}
    }, 20000);
  });
}

async function stopWebPresence(){
  try { if (webHeartbeat) clearInterval(webHeartbeat); } catch (e) {}
  webHeartbeat = null;

  try { await webPresenceChannel?.untrack(); } catch (e) {}
  try { await webPresenceChannel?.unsubscribe(); } catch (e) {}
  webPresenceChannel = null;

  pushWebCountToChat(0);
}

document.addEventListener("DOMContentLoaded", function initBillboard(){
  const track = document.getElementById("bbTrack");
  const viewport = document.getElementById("bbViewport");
  const prevBtn = document.getElementById("bbPrev");
  const nextBtn = document.getElementById("bbNext");
  const dotsWrap = document.getElementById("bbDots");

  if (!track || !dotsWrap) return;

  const slides = Array.from(track.querySelectorAll(".bb-slide"));
  if (!slides.length) return;

  let i = 0;
  let timer = null;

  // build dots
  dotsWrap.innerHTML = "";
  const dots = slides.map((_, idx) => {
    const b = document.createElement("button");
    b.type = "button";
    b.className = "bb-dot" + (idx === 0 ? " active" : "");
    b.addEventListener("click", () => go(idx, true));
    dotsWrap.appendChild(b);
    return b;
  });

  function render(){
    track.style.transform = `translateX(${-i * 100}%)`;
    dots.forEach((d, idx) => d.classList.toggle("active", idx === i));
  }

  function go(nextIndex, userAction=false){
    i = (nextIndex + slides.length) % slides.length;
    render();
    if (userAction) restartAuto();
  }

  function next(){ go(i + 1, true); }
  function prev(){ go(i - 1, true); }

  prevBtn?.addEventListener("click", prev);
  nextBtn?.addEventListener("click", next);

  function startAuto(){
  stopAuto();
  timer = setInterval(() => {
    i = (i + 1) % slides.length;
    render();
  }, 60000);
}

viewport?.addEventListener("mouseenter", stopAuto);
viewport?.addEventListener("mouseleave", startAuto);
viewport?.addEventListener("touchstart", stopAuto);
viewport?.addEventListener("touchend", startAuto);    
  
  function stopAuto(){
    if (timer) clearInterval(timer);
    timer = null;
  }
  function restartAuto(){
    startAuto();
  }

  render();
startAuto();

// Swipe support (mobile)
let startX = null;

viewport?.addEventListener("touchstart", (e) => {
  startX = e.touches[0].clientX;
}, { passive: true });

viewport?.addEventListener("touchend", (e) => {
  if (startX == null) return;
  const endX = e.changedTouches[0].clientX;
  const dx = endX - startX;
  startX = null;

  if (Math.abs(dx) > 40) {
    if (dx < 0) next();
    else prev();
  }
}, { passive: true });
startAuto();  
});

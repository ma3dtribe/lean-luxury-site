  <script>
    (function () {
      const CHANNEL = "ma3dtribe";
      const PARENT = "ma3dtribe.netlify.app";

      const mount = document.getElementById("playerMount");
      const desc = document.getElementById("watchDesc");
      const manualBtn = document.getElementById("manualLoadBtn");
      const watchShell = document.getElementById("watchShell");

       function loadPlayer() {
        if (mount.dataset.loaded) return;
        mount.dataset.loaded = "1";
        
        manualBtn.style.display = "none";
        
        const iframe = document.createElement("iframe");
        iframe.src = `https://player.twitch.tv/?channel=${CHANNEL}&parent=${PARENT}&autoplay=true&muted=true`;
        iframe.width = "100%";
        iframe.height = "420";
        iframe.allowFullscreen = true;
        iframe.style.border = "0";
        iframe.style.borderRadius = "18px";

        mount.appendChild(iframe);
      }

      manualBtn.addEventListener("click", loadPlayer);
setInterval(() => {
  fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(`https://decapi.me/twitch/uptime/${CHANNEL}?redirect=false`), { cache: "no-store" })
    .then(r => r.text())
    .then(t => {
      const text = (t || "").toLowerCase();
      const isLive = !text.includes("offline");

      if (isLive && !mount.dataset.loaded) {
        desc.textContent = "We’re live — loading the stream now.";
        loadPlayer();
      }
    })
    .catch(() => {});
}, 10000);      
      

      fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(`https://decapi.me/twitch/uptime/${CHANNEL}?redirect=false`), { cache: "no-store" })
  .then(r => r.text())
  .then(t => {
    const text = (t || "").toLowerCase();
    const isLive = !text.includes("offline");

    if (isLive) {
      desc.textContent = "We’re live — loading the stream now.";
      loadPlayer();
    } else {
     desc.textContent = "Currently off air. Tap “LOAD MA3D Vibes” when we go live.";
      manualBtn.style.display = "inline-flex";
    }
  })
  .catch(() => {
    desc.textContent = "Status unavailable. Tap “LOAD MA3D Vibes” to start the stream.";
    manualBtn.style.display = "inline-flex";
  });
    })();
    /* =========================
   BILLBOARD SLIDER
========================= */
document.addEventListener("DOMContentLoaded", function initBillboard(){
  const track = document.getElementById("bbTrack");
  const viewport = document.getElementById("bbViewport");
  const prevBtn = document.getElementById("bbPrev");
  const nextBtn = document.getElementById("bbNext");
  const dotsWrap = document.getElementById("bbDots");

  if (!track || !dotsWrap) return;

  const slides = Array.from(track.querySelectorAll(".bb-slide"));
  if (!slides.length) return;

  let i = 0;
  let timer = null;

  // build dots
  dotsWrap.innerHTML = "";
  const dots = slides.map((_, idx) => {
    const b = document.createElement("button");
    b.type = "button";
    b.className = "bb-dot" + (idx === 0 ? " active" : "");
    b.addEventListener("click", () => go(idx, true));
    dotsWrap.appendChild(b);
    return b;
  });

  function render(){
    track.style.transform = `translateX(${-i * 100}%)`;
    dots.forEach((d, idx) => d.classList.toggle("active", idx === i));
  }

  function go(nextIndex, userAction=false){
    i = (nextIndex + slides.length) % slides.length;
    render();
    if (userAction) restartAuto();
  }

  function next(){ go(i + 1, true); }
  function prev(){ go(i - 1, true); }

  prevBtn?.addEventListener("click", prev);
  nextBtn?.addEventListener("click", next);

  function startAuto(){
  stopAuto();
  timer = setInterval(() => {
    i = (i + 1) % slides.length;
    render();
  }, 6000);
}

viewport?.addEventListener("mouseenter", stopAuto);
viewport?.addEventListener("mouseleave", startAuto);
viewport?.addEventListener("touchstart", stopAuto);
viewport?.addEventListener("touchend", startAuto);    
  
  function stopAuto(){
    if (timer) clearInterval(timer);
    timer = null;
  }
  function restartAuto(){
    startAuto();
  }

  render();
startAuto();

// Swipe support (mobile)
let startX = null;

viewport?.addEventListener("touchstart", (e) => {
  startX = e.touches[0].clientX;
}, { passive: true });

viewport?.addEventListener("touchend", (e) => {
  if (startX == null) return;
  const endX = e.changedTouches[0].clientX;
  const dx = endX - startX;
  startX = null;

  if (Math.abs(dx) > 40) {
    if (dx < 0) next();
    else prev();
  }
}, { passive: true });
startAuto();  
});

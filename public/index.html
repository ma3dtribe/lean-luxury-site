const ROOM = "ma3dtribe";

const sb = window.supabase?.createClient(SUPABASE_URL, SUPABASE_KEY);      

let webPresenceChannel = null;
let webHeartbeat = null;
let streamLoaded = true;

let webSessionId = localStorage.getItem(WEB_SESSION_KEY);
if (!webSessionId) {
  webSessionId = (crypto?.randomUUID?.() || (Date.now() + "-" + Math.random().toString(16).slice(2)));
  localStorage.setItem(WEB_SESSION_KEY, webSessionId);
}

function pushWebCountToChat(count){
  const n = Number(count || 0);

  try {
    chatFrame?.contentWindow?.postMessage({
      type: "ma3d:webCount",
      count: n
    }, "*");
  } catch (e) {}

  try {
    const viewCountInFrame = chatFrame?.contentDocument?.getElementById("viewCount");
    if (viewCountInFrame) viewCountInFrame.textContent = String(n);
  } catch (e) {}
}

function recomputeWebCount(channel){
  if (!channel) return;

  const state = channel.presenceState();
  const now = Date.now();
  const STALE_MS = 120000;

  const sessions = new Map();

  for (const key in state) {
    const metas = (state[key] || []).filter(m => {
      return m?.streamLoaded === true && (now - Number(m?.t || 0)) < STALE_MS;
    });

    if (!metas.length) continue;

    let latest = metas[0];
    for (const m of metas) {
      if (Number(m?.t || 0) > Number(latest?.t || 0)) {
        latest = m;
      }
    }

    sessions.set(key, latest);
  }

  pushWebCountToChat(sessions.size);
}

async function startWebPresence(){
  if (!sb) return;
  if (!streamLoaded && isTabActive) return;

  if (webPresenceChannel) {
    try { await webPresenceChannel.unsubscribe(); } catch (e) {}
    webPresenceChannel = null;
  }

  webPresenceChannel = sb.channel(`web-presence:${ROOM}`, {
    config: { presence: { key: webSessionId } }
  });

  webPresenceChannel
    .on("presence", { event: "sync" }, () => recomputeWebCount(webPresenceChannel))
    .on("presence", { event: "join" }, () => recomputeWebCount(webPresenceChannel))
    .on("presence", { event: "leave" }, () => recomputeWebCount(webPresenceChannel));

  await webPresenceChannel.subscribe(async (status) => {
    if (status !== "SUBSCRIBED") return;

    try {
      await webPresenceChannel.track({
        streamLoaded: true,
        t: Date.now()
      });
    } catch (e) {}

    recomputeWebCount(webPresenceChannel);

    if (webHeartbeat) clearInterval(webHeartbeat);

    webHeartbeat = setInterval(async () => {
      try {
        await webPresenceChannel.track({
          streamLoaded: true,
          t: Date.now()
        });
        recomputeWebCount(webPresenceChannel);
      } catch (e) {}
    }, 15000);
  });
}

async function stopWebPresence(){
  try { if (webHeartbeat) clearInterval(webHeartbeat); } catch (e) {}
  webHeartbeat = null;

  try { await webPresenceChannel?.untrack(); } catch (e) {}
  try { await webPresenceChannel?.unsubscribe(); } catch (e) {}
  webPresenceChannel = null;

  pushWebCountToChat(0);
}

document.addEventListener("DOMContentLoaded", function initBillboard(){
  const track = document.getElementById("bbTrack");
  const viewport = document.getElementById("bbViewport");
  const prevBtn = document.getElementById("bbPrev");
  const nextBtn = document.getElementById("bbNext");
  const dotsWrap = document.getElementById("bbDots");

  if (!track || !dotsWrap) return;

  const slides = Array.from(track.querySelectorAll(".bb-slide"));
  if (!slides.length) return;

  let i = 0;
  let timer = null;

  // build dots
  dotsWrap.innerHTML = "";
  const dots = slides.map((_, idx) => {
    const b = document.createElement("button");
    b.type = "button";
    b.className = "bb-dot" + (idx === 0 ? " active" : "");
    b.addEventListener("click", () => go(idx, true));
    dotsWrap.appendChild(b);
    return b;
  });

  function render(){
    track.style.transform = `translateX(${-i * 100}%)`;
    dots.forEach((d, idx) => d.classList.toggle("active", idx === i));
  }

  function go(nextIndex, userAction=false){
    i = (nextIndex + slides.length) % slides.length;
    render();
    if (userAction) restartAuto();
  }

  function next(){ go(i + 1, true); }
  function prev(){ go(i - 1, true); }

  prevBtn?.addEventListener("click", prev);
  nextBtn?.addEventListener("click", next);

  function startAuto(){
  stopAuto();
  timer = setInterval(() => {
    i = (i + 1) % slides.length;
    render();
  }, 6000);
}

viewport?.addEventListener("mouseenter", stopAuto);
viewport?.addEventListener("mouseleave", startAuto);
viewport?.addEventListener("touchstart", stopAuto);
viewport?.addEventListener("touchend", startAuto);    
  
  function stopAuto(){
    if (timer) clearInterval(timer);
    timer = null;
  }
  function restartAuto(){
    startAuto();
  }

  render();
startAuto();

// Swipe support (mobile)
let startX = null;

viewport?.addEventListener("touchstart", (e) => {
  startX = e.touches[0].clientX;
}, { passive: true });

viewport?.addEventListener("touchend", (e) => {
  if (startX == null) return;
  const endX = e.changedTouches[0].clientX;
  const dx = endX - startX;
  startX = null;

  if (Math.abs(dx) > 40) {
    if (dx < 0) next();
    else prev();
  }
}, { passive: true });
startAuto();  
});

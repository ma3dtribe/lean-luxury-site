<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Ma3dTribe Chat</title>

  <style>
    html, body { width:100%; overflow-x:hidden; }
    * { box-sizing:border-box; }
    img, video, canvas { max-width:100%; height:auto; }
    pre, code { white-space: pre-wrap; overflow-wrap: anywhere; }
    input, textarea, button { max-width:100%; }

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:#0b0f14;
      color:#e9eef6;
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:8px;
    }

    .card{
      background:#111826;
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 16px 60px rgba(0,0,0,.35);
      display:flex;
      flex-direction:column;
      height:calc(100vh - 32px);
    }

    .pill{
  display:inline-flex;
  align-items:center;
  gap:4px;
  padding:4px 6px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.04);
  font-size:11px;
  opacity:.95;
  min-height:24px;
}

    .linkBtn{
      background:transparent;
      border:0;
      color:#93c5fd;
      cursor:pointer;
      padding:0;
      font-size:13px;
    }

    .linkBtn:hover{ text-decoration:underline; }

    .chatRule{
      margin:6px 8px 4px;
  padding:7px 8px;
      border-radius:12px;
      text-align:center;
      font-size:12px;
      line-height:1.35;
      color:#e9eef6;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,60,60,.55);
      box-shadow:0 0 10px rgba(255,60,60,.25);
      word-wrap:break-word;
    }

    .chatRule span{
      font-weight:900;
      letter-spacing:.3px;
    }

    .presence{
      display:flex;
      flex-direction:column;
      gap:6px;
      font-size:12px;
      opacity:.95;
      margin:4px 8px 6px;
      position:relative;
      z-index:50;
      pointer-events:auto;
    }

    .presence *{ pointer-events:auto; }

    .userLine{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .presRow{
  display:flex;
  flex-wrap:nowrap;
  justify-content:space-between;
  align-items:center;
  gap:4px;
}

    .viewerBtn{
  display:inline-flex;
  align-items:center;
  gap:4px;
  padding:0 6px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.06);
  color:#e9eef6;
  cursor:pointer;
  height:24px;
  min-width:auto;
  font-size:11px;
  font-weight:500;
  position:relative;
  z-index:60;
}

    .viewerBtn b{ font-weight:900; }
    .viewerBtn:hover{ background:rgba(255,255,255,.10); }

    #chatMessages{
  flex:1;
  min-height:0;
  overflow:auto;
  padding:6px 8px 8px;
  display:flex;
  flex-direction:column;
  gap:8px;
  background:linear-gradient(to bottom, rgba(255,255,255,.02), rgba(255,255,255,0));
  scroll-behavior:smooth;
}

    .msg{
  max-width:82%;
  padding:8px 10px 7px;
  border-radius:18px;
  border:none;
  line-height:1.3;
  word-wrap:break-word;
  position:relative;
  box-shadow:0 2px 10px rgba(0,0,0,.12);
}

.msg.stickerMsg{
  padding:6px;
  border:none;
  box-shadow:none;
}    
    
  .me{
  margin-left:auto;
  background:#4f8df7;
  color:#fff;
  border-bottom-right-radius:8px;
}

.them{
  margin-right:auto;
  background:#374151;
  color:#f3f4f6;
  border-bottom-left-radius:8px;
}

    .meta{
      display:flex;
      align-items:center;
      gap:6px;
      font-size:11px;
      opacity:.92;
      margin-bottom:5px;
      flex-wrap:wrap;
    }

 .meta .uname{
  font-weight:900;
  font-size:16px;
  color:#fff;
  background:linear-gradient(90deg, #38bdf8, #22c55e);
  padding:4px 10px;
  border-radius:999px;
  text-shadow:0 1px 4px rgba(0,0,0,.4);
}

    .replyQuote{
      margin:0 0 8px;
      padding:7px 9px;
      border-left:3px solid rgba(255,255,255,.45);
      background:rgba(255,255,255,.10);
      border-radius:10px;
      font-size:12px;
      opacity:.95;
    }

    .replyQuote b{
      display:block;
      margin-bottom:2px;
      font-size:11px;
      opacity:.92;
    }

    .msgBody{
      font-size:14px;
    }

  .msg img{
  max-width:100%;
  width:auto;
  border-radius:12px;
  display:block;
  border:none;
}

.msg video{
  max-width:100%;
  width:auto;
  border-radius:12px;
  display:block;
  border:none;
  background:transparent;
}    
    
    .msg.stickerMsg img,
    .msg.stickerMsg video{
      border:none;
      box-shadow:none;
      background:transparent;
    }

.msgActions{
  display:none;
  gap:6px;
  margin-top:7px;
  flex-wrap:wrap;
  opacity:.96;
}

.msg.showActions .msgActions{
  display:flex;
}

    .msgActionBtn{
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.08);
      color:inherit;
      border-radius:999px;
      font-size:11px;
      padding:4px 8px;
      cursor:pointer;
      min-height:28px;
    }

    .msgActionBtn:hover{
      background:rgba(255,255,255,.16);
    }

    .composer{
  padding:8px 10px;
  border-top:0;
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;
  flex-direction:column;
  gap:8px;
  background:#111826;
  position:relative;
}

    .replyPreview{
  display:none;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:8px 10px;
  border-radius:12px;
  background:rgba(37,99,235,.14);
  border-left:4px solid #60a5fa;
  font-size:12px;
    }

    .replyPreviewText{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:0;
    }

    .replyPreviewText span{
      opacity:.85;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:100%;
    }

    .replyClose{
      border:0;
      background:transparent;
      color:#e9eef6;
      font-size:16px;
      cursor:pointer;
    }

    #messageInput{
      width:100%;
      font-size:16px;
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background:#0e1623;
      color:#e9eef6;
      outline:none;
    }

    .btn-row{
      display:grid;
      grid-template-columns:auto auto auto 1fr;
      gap:8px;
      align-items:center;
      width:100%;
    }

    .btn{
      padding:6px 10px;
      font-size:12px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.14);
      background:#0e1623;
      color:#e9eef6;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
      min-height:40px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .btn:hover{ filter:brightness(1.08); }

    .btnPrimary{
      background:#2563eb;
      border-color:#2563eb;
      justify-self:end;
      min-width:88px;
    }

    #gifSearch{ font-size:16px; }

    /* GIF MODAL */
    #gifModal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.75);
      z-index:99999;
      pointer-events:none;
    }

    #gifModal.show{
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:6vh 12px;
      pointer-events:auto;
    }

    .modalBox{
      background:#0f1623;
      border:1px solid rgba(255,255,255,.12);
      border-radius:14px;
      max-width:920px;
      width:100%;
      margin:6vh auto;
      padding:12px;
      box-shadow:0 20px 80px rgba(0,0,0,.5);
    }

    .modalTop{
      display:flex;
      gap:10px;
      align-items:center;
      padding:6px;
    }

    #gifSearch{
      flex:1;
      padding:12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background:#0b1220;
      color:#e9eef6;
      outline:none;
    }

    .hint{
      opacity:.7;
      font-size:12px;
      padding:0 10px 10px;
    }

    #gifResults{
      padding:8px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      max-height:62vh;
      overflow:auto;
    }

    #gifResults img{
      width:100%;
      border-radius:12px;
      cursor:pointer;
      border:1px solid rgba(255,255,255,.10);
    }

    #gifResults img:hover{
      transform:translateY(-1px);
      transition:.08s;
    }

    /* EMOJI + STICKERS */
    .emojiPopup{
      position: fixed;
      right: 18px;
      bottom: 92px;
      width: 420px;
      max-width: calc(100vw - 20px);
      background: #0f1623;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 14px;
      box-shadow: 0 20px 80px rgba(0,0,0,.55);
      display: none;
      z-index: 100000;
      max-height: 52vh;
      overflow: auto;
      pointer-events:none;
    }

    .emojiPopup.show{
      display:block;
      pointer-events:auto;
    }

    .emojiHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.10);
    }

    .emojiTitle{ font-weight:800; opacity:.95; }

    .emojiClose{
      background:transparent;
      border:0;
      color:#e9eef6;
      opacity:.75;
      cursor:pointer;
      font-size:16px;
    }

    .emojiClose:hover{ opacity:1; }

    .emojiGrid{
      padding:10px;
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
    }

    .emojiBtn{
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      border-radius: 12px;
      cursor:pointer;
      height:36px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      line-height:1;
    }

    .emojiBtn:hover{ filter:brightness(1.12); }

    .emojiHint{
      padding: 0 12px 12px;
      opacity:.7;
      font-size:12px;
    }

    .ma3dBadge{
      display:inline-block;
      font-weight:900;
      font-size:12px;
      letter-spacing:.6px;
      padding:3px 8px;
      border-radius:999px;
      color:#0b0f14;
      background: linear-gradient(90deg, #38bdf8, #22c55e);
      margin:0 2px;
    }

    /* Viewer modal */
    .vModal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.72);
      z-index:100001;
      pointer-events:auto;
    }

    .vModal.show{ display:block; }

    .vBox{
      background:#0f1623;
      border:1px solid rgba(255,255,255,.12);
      border-radius:14px;
      max-width:520px;
      margin:10vh auto;
      padding:12px;
      box-shadow:0 20px 80px rgba(0,0,0,.55);
    }

    .vTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:6px 6px 10px;
      border-bottom:1px solid rgba(255,255,255,.10);
    }

    .vClose{
      border:0;
      background:transparent;
      color:#e9eef6;
      font-size:18px;
      cursor:pointer;
      opacity:.85;
    }

    .vClose:hover{ opacity:1; }

    .vList{
      padding:10px 6px 6px;
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height:52vh;
      overflow:auto;
    }

    .vItem{
      display:flex;
      justify-content:space-between;
      gap:10px;
      padding:10px 10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
    }

    .vTag{ font-size:12px; opacity:.85; }

@media (max-width:820px){
  #gifResults{ grid-template-columns:repeat(2,1fr); }
}

@media (max-width:520px){

  .presence{
    gap:4px;
    margin:2px 8px 4px;
  }

  .userLine{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:6px;
    font-size:11px;
  }

  .pill,
  .viewerBtn{
    font-size:11px;
    min-height:24px;
    padding:4px 8px;
  }

  .presRow{
    display:flex;
    flex-wrap:nowrap;
    justify-content:space-between;
    align-items:center;
    gap:4px;
    overflow:hidden;
  }

  .presRow .pill,
  .presRow .viewerBtn{
    flex:1;
    text-align:center;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    padding:4px 6px;
    font-size:10.5px;
  }

  #gifResults{
    grid-template-columns:repeat(2,1fr);
    max-height:55vh;
  }

  .emojiPopup{
    left:12px;
    right:12px;
    bottom:84px;
    width:auto;
    max-width:none;
  }

  .emojiGrid{ grid-template-columns:repeat(3,1fr); }
  .emojiBtn{ height:42px; font-size:22px; }

    .msg img{ max-width:300px; }

  #gifModal.show{
    padding:10px;
    align-items:stretch;
  }

  .modalBox{
    width:100%;
    max-width:none;
    margin:0;
    padding:10px;
    border-radius:14px;
    max-height:82vh;
    overflow:auto;
  }

  .modalTop{
    flex-wrap:wrap;
    gap:8px;
  }

  #gifSearch{
    width:100%;
    flex:1 1 100%;
  }

  .btn-row{
    grid-template-columns:auto auto auto 1fr;
  }
} 
  </style>
</head>

    <div class="card">

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function scrollBottom(){
      chatMessages.scrollTop = chatMessages.scrollHeight;

    timeZone: "America/New_York",
    month: "short",
    day: "2-digit",
    hour: "numeric",
    minute: "2-digit"
  }).format(d).replace(",", "");
}

      s = s.replace(/\s+/g, " ").trim();

    function shouldHideMessage(text){
      const s = cleanDisplayText(text || "").trim().toLowerCase();
      if (!s) return true;

      const BLOCKED_EMOTE_WORDS = ["sip", "time", "sip time", "pew", "pew pew", "redness"];
      if (BLOCKED_EMOTE_WORDS.includes(s)) return true;

      const parts = s.split(/\s+/).filter(Boolean);
      if (!parts.length) return true;
      if (parts.every(p => BLOCKED_EMOTE_WORDS.includes(p))) return true;

      return false;
    }

    function truncateReplyText(text){
      return String(text || "").replace(/\s+/g, " ").trim().slice(0, 80);

      return `[reply:${encodeURIComponent(replyUser || "Guest")}|${encodeURIComponent(replyText || "")}] ${bodyText || ""}`;
    }

    function parseReplyPayload(content){
      const str = String(content || "");
      const match = str.match(/^\[reply:([^|]*?)\|([^\]]*?)\]\s*([\s\S]*)$/);
      if (!match) {
        return {
          replyUser: null,
          replyText: null,
          body: str
        };
      }

      return {
        replyUser: decodeURIComponent(match[1] || ""),
        replyText: decodeURIComponent(match[2] || ""),
        body: match[3] || ""
      };
    }

    function recomputeCounts(channel){
  if (!channel) return;
  const state = channel.presenceState();

  const sessions = new Map();
  let chatters = 0;

  for (const key in state) {
    const metas = state[key] || [];
    if (!metas.length) continue;

    let latest = metas[0];
    for (const m of metas) {
      if (Number(m?.t || 0) > Number(latest?.t || 0)) {
        latest = m;
      }
    }

    sessions.set(key, latest);

    if (metas.some(m => m?.chatted === true)) {
      chatters += 1;
    }
  }

  const viewers = sessions.size;

  if (viewCountEl) viewCountEl.textContent = String(viewers);
  if (chatCountEl) chatCountEl.textContent = String(chatters);

  updateViewersUI(channel);
}

async function startPresence(){
  if (!sb) return;

  presenceChannel = sb.channel(`presence:${ROOM}`, {
    config: { presence: { key: sessionId } }
  });

  presenceChannel
    .on("presence", { event: "sync" }, () => recomputeCounts(presenceChannel))
    .on("presence", { event: "join" }, () => recomputeCounts(presenceChannel))
    .on("presence", { event: "leave" }, () => recomputeCounts(presenceChannel));

  await presenceChannel.subscribe(async (status) => {
    if (status !== "SUBSCRIBED") return;

    await presenceChannel.track({
      username: USERNAME || "Guest",
      chatted: hasChatted,
      t: Date.now()
    });

    recomputeCounts(presenceChannel);

    if (presenceHeartbeat) clearInterval(presenceHeartbeat);

    presenceHeartbeat = setInterval(async () => {
      try {
        await presenceChannel.track({
          username: USERNAME || "Guest",
          chatted: hasChatted,
          t: Date.now()
        });
      } catch (e) {}
    }, 20000);
  });

  window.addEventListener("beforeunload", () => {
  try { presenceChannel?.untrack(); } catch(e) {}
  try { if (presenceHeartbeat) clearInterval(presenceHeartbeat); } catch(e) {}
});
}

function buildViewerRowsFromPresence(channel){
  const state = channel?.presenceState?.() || {};

  for (const key in state){
    const metas = state[key] || [];

    let latest = metas[0];
    for (const m of metas){
      if (Number(m?.t || 0) > Number(latest?.t || 0)) {
        latest = m;
      }
    }

    rows.push({
      name: (latest.username || "Guest").toString(),
      chatted: !!latest.chatted,
      t: Number(latest.t || 0)
    });
  }

  return rows.sort((a,b) => {
    if (a.chatted !== b.chatted) return a.chatted ? -1 : 1;
    return (b.t || 0) - (a.t || 0);
  });
}

      ma3dBtn.addEventListener("click", () => {
        insertAtCursor(messageInput, ` ${MA3D_TOKEN} `);
        closeEmoji();
      });
      emojiGrid.appendChild(ma3dBtn);

      EMOJIS.forEach(e => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "emojiBtn";
        b.textContent = e;
        b.addEventListener("click", () => {
          insertAtCursor(messageInput, e);
          closeEmoji();
        });
        emojiGrid.appendChild(b);
      });
    }

    buildEmojiGrid();

    emojiBtn.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (emojiPopup.classList.contains("show")) closeEmoji();
      else openEmoji();
    });

    stickerBtn.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (stickerModal.classList.contains("show")) closeStickers();
      else openStickers();
    });

    emojiClose.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      closeEmoji();
    });

    stickerClose.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      closeStickers();
    });

    document.addEventListener("click", (e) => {
      if (emojiPopup.classList.contains("show")) {
        if (!emojiPopup.contains(e.target) && !emojiBtn.contains(e.target)) closeEmoji();
      }

      if (stickerModal.classList.contains("show")) {
        if (!stickerModal.contains(e.target) && !stickerBtn.contains(e.target)) closeStickers();
      }
    });

document.addEventListener("click", (e) => {
  if (e.target.closest(".msg")) return;

  document.querySelectorAll(".msg.showActions").forEach(el => {
    el.classList.remove("showActions");
  });
});    
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeEmoji();
        closeStickers();
        closeGifModal();
        closeViewerModal();
      }
    });
    
chatMessages.addEventListener("scroll", () => {
  const nearBottom =
    chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight < 120;

  if (nearBottom) {
    loadOlderMessages();
  }
});
    
    /* =========================
       START
    ========================= */
    window.addEventListener("load", async () => {
  window.sendText = sendText;
  window.sb = sb;
  console.log("CHAT SCRIPT LOADED");

  try { messageInput && messageInput.focus(); } catch(e) {}

  try { await loadInitial(); } catch(e) { console.error("loadInitial failed", e); }
  try { subscribeRealtime(); } catch(e) { console.error("subscribeRealtime failed", e); }
  try { startPresence(); } catch(e) { console.error("startPresence failed", e); }

  try { refreshTwitchViewers(); } catch(e) { console.error("refreshTwitchViewers failed", e); }
  setInterval(() => {
    try { refreshTwitchViewers(); } catch(e) { console.error("refreshTwitchViewers interval failed", e); }
  }, 30000);
});
  </script>

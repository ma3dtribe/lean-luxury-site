<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Ma3dTribe Chat</title>

  <style>
    html, body { width:100%; overflow-x:hidden; }
    * { box-sizing:border-box; }
    img, video, canvas { max-width:100%; height:auto; }
    pre, code { white-space: pre-wrap; overflow-wrap: anywhere; }
    input, textarea, button { max-width:100%; }

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:#0b0f14;
      color:#e9eef6;
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:8px;
    }

    .card{
      background:#111826;
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 16px 60px rgba(0,0,0,.35);
      display:flex;
      flex-direction:column;
      height:calc(100vh - 32px);
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
      font-size:13px;
      opacity:.95;
      min-height:30px;
    }

    .linkBtn{
      background:transparent;
      border:0;
      color:#93c5fd;
      cursor:pointer;
      padding:0;
      font-size:13px;
    }

    .linkBtn:hover{ text-decoration:underline; }

    .chatRule{
      margin:6px 8px 4px;
  padding:7px 8px;
      border-radius:12px;
      text-align:center;
      font-size:12px;
      line-height:1.35;
      color:#e9eef6;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,60,60,.55);
      box-shadow:0 0 10px rgba(255,60,60,.25);
      word-wrap:break-word;
    }

    .chatRule span{
      font-weight:900;
      letter-spacing:.3px;
    }

    .presence{
      display:flex;
      flex-direction:column;
      gap:6px;
      font-size:12px;
      opacity:.95;
      margin:4px 8px 6px;
      position:relative;
      z-index:50;
      pointer-events:auto;
    }

    .presence *{ pointer-events:auto; }

    .userLine{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .presRow{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    .viewerBtn{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:0 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:#e9eef6;
      cursor:pointer;
      height:30px;
      min-width:auto;
      font-size:12px;
      font-weight:500;
      position:relative;
      z-index:60;
    }

    .viewerBtn b{ font-weight:900; }
    .viewerBtn:hover{ background:rgba(255,255,255,.10); }

    #chatMessages{
      flex:1;
      min-height:0;
      overflow:auto;
      padding:8px;
      display:flex;
      flex-direction:column;
      gap:8px;
      background:linear-gradient(to bottom, rgba(255,255,255,.02), rgba(255,255,255,0));
      scroll-behavior:smooth;
    }

    .msg{
      max-width:82%;
      padding:8px 10px 7px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.08);
      line-height:1.3;
      word-wrap:break-word;
      position:relative;
      box-shadow:0 2px 10px rgba(0,0,0,.12);
    }

    .me{
      margin-left:auto;
      background:#2563eb;
      color:#fff;
      border-bottom-right-radius:8px;
    }

    .them{
      margin-right:auto;
      background:#1b2433;
      color:#e9eef6;
      border-bottom-left-radius:8px;
    }

    .meta{
      display:flex;
      align-items:center;
      gap:6px;
      font-size:11px;
      opacity:.92;
      margin-bottom:5px;
      flex-wrap:wrap;
    }

    .meta .uname{
      font-weight:800;
      font-size:12px;
      color:#fff;
      background:rgba(255,255,255,.12);
      padding:2px 8px;
      border-radius:999px;
      text-shadow:none;
    }

    .replyQuote{
      margin:0 0 8px;
      padding:7px 9px;
      border-left:3px solid rgba(255,255,255,.45);
      background:rgba(255,255,255,.10);
      border-radius:10px;
      font-size:12px;
      opacity:.95;
    }

    .replyQuote b{
      display:block;
      margin-bottom:2px;
      font-size:11px;
      opacity:.92;
    }

    .msgBody{
      font-size:14px;
    }

    .msg img{
      max-width:100%;
      width:auto;
      border-radius:12px;
      display:block;
      border:1px solid rgba(255,255,255,.10);
    }

    .msgActions{
      display:flex;
      gap:6px;
      margin-top:7px;
      flex-wrap:wrap;
      opacity:.96;
    }

    .msgActionBtn{
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.08);
      color:inherit;
      border-radius:999px;
      font-size:11px;
      padding:4px 8px;
      cursor:pointer;
      min-height:28px;
    }

    .msgActionBtn:hover{
      background:rgba(255,255,255,.16);
    }

    .composer{
      padding:8px 10px calc(10px + env(safe-area-inset-bottom));
      border-top:1px solid rgba(255,255,255,.08);
      display:flex;
      flex-direction:column;
      gap:8px;
      background:#111826;
      position:sticky;
      bottom:0;
    }

    .replyPreview{
  display:none;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:8px 10px;
  border-radius:12px;
  background:rgba(37,99,235,.14);
  border-left:4px solid #60a5fa;
  font-size:12px;
    }

    .replyPreviewText{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:0;
    }

    .replyPreviewText span{
      opacity:.85;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:100%;
    }

    .replyClose{
      border:0;
      background:transparent;
      color:#e9eef6;
      font-size:16px;
      cursor:pointer;
    }

    #messageInput{
      width:100%;
      font-size:16px;
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background:#0e1623;
      color:#e9eef6;
      outline:none;
    }

    .btn-row{
      display:grid;
      grid-template-columns:auto auto auto 1fr;
      gap:8px;
      align-items:center;
      width:100%;
    }

    .btn{
      padding:6px 10px;
      font-size:12px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.14);
      background:#0e1623;
      color:#e9eef6;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
      min-height:40px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .btn:hover{ filter:brightness(1.08); }

    .btnPrimary{
      background:#2563eb;
      border-color:#2563eb;
      justify-self:end;
      min-width:88px;
    }

    #gifSearch{ font-size:16px; }

    /* GIF MODAL */
    #gifModal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.75);
      z-index:99999;
      pointer-events:none;
    }

    #gifModal.show{
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:6vh 12px;
      pointer-events:auto;
    }

    .modalBox{
      background:#0f1623;
      border:1px solid rgba(255,255,255,.12);
      border-radius:14px;
      max-width:920px;
      width:100%;
      margin:6vh auto;
      padding:12px;
      box-shadow:0 20px 80px rgba(0,0,0,.5);
    }

    .modalTop{
      display:flex;
      gap:10px;
      align-items:center;
      padding:6px;
    }

    #gifSearch{
      flex:1;
      padding:12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background:#0b1220;
      color:#e9eef6;
      outline:none;
    }

    .hint{
      opacity:.7;
      font-size:12px;
      padding:0 10px 10px;
    }

    #gifResults{
      padding:8px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      max-height:62vh;
      overflow:auto;
    }

    #gifResults img{
      width:100%;
      border-radius:12px;
      cursor:pointer;
      border:1px solid rgba(255,255,255,.10);
    }

    #gifResults img:hover{
      transform:translateY(-1px);
      transition:.08s;
    }

    /* EMOJI + STICKERS */
    .emojiPopup{
      position: fixed;
      right: 18px;
      bottom: 92px;
      width: 420px;
      max-width: calc(100vw - 20px);
      background: #0f1623;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 14px;
      box-shadow: 0 20px 80px rgba(0,0,0,.55);
      display: none;
      z-index: 100000;
      max-height: 52vh;
      overflow: auto;
      pointer-events:none;
    }

    .emojiPopup.show{
      display:block;
      pointer-events:auto;
    }

    .emojiHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.10);
    }

    .emojiTitle{ font-weight:800; opacity:.95; }

    .emojiClose{
      background:transparent;
      border:0;
      color:#e9eef6;
      opacity:.75;
      cursor:pointer;
      font-size:16px;
    }

    .emojiClose:hover{ opacity:1; }

    .emojiGrid{
      padding:10px;
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
    }

    .emojiBtn{
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      border-radius: 12px;
      cursor:pointer;
      height:36px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      line-height:1;
    }

    .emojiBtn:hover{ filter:brightness(1.12); }

    .emojiHint{
      padding: 0 12px 12px;
      opacity:.7;
      font-size:12px;
    }

    .ma3dBadge{
      display:inline-block;
      font-weight:900;
      font-size:12px;
      letter-spacing:.6px;
      padding:3px 8px;
      border-radius:999px;
      color:#0b0f14;
      background: linear-gradient(90deg, #38bdf8, #22c55e);
      margin:0 2px;
    }

    /* Viewer modal */
    .vModal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.72);
      z-index:100001;
      pointer-events:auto;
    }

    .vModal.show{ display:block; }

    .vBox{
      background:#0f1623;
      border:1px solid rgba(255,255,255,.12);
      border-radius:14px;
      max-width:520px;
      margin:10vh auto;
      padding:12px;
      box-shadow:0 20px 80px rgba(0,0,0,.55);
    }

    .vTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:6px 6px 10px;
      border-bottom:1px solid rgba(255,255,255,.10);
    }

    .vClose{
      border:0;
      background:transparent;
      color:#e9eef6;
      font-size:18px;
      cursor:pointer;
      opacity:.85;
    }

    .vClose:hover{ opacity:1; }

    .vList{
      padding:10px 6px 6px;
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height:52vh;
      overflow:auto;
    }

    .vItem{
      display:flex;
      justify-content:space-between;
      gap:10px;
      padding:10px 10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
    }

    .vTag{ font-size:12px; opacity:.85; }

    @media (max-width:820px){
      #gifResults{ grid-template-columns:repeat(2,1fr); }
    }

    @media (max-width:520px){
      .wrap{ padding:10px; }

      .card{
  height:100vh;
  border-radius:14px;
      }

      .chatRule{
        margin:8px 10px 6px;
        font-size:11px;
      }

      .msg{ max-width:88%; }

      .msg img{ max-width:300px; }

      #gifModal.show{
        padding:10px;
        align-items:stretch;
      }

      .modalBox{
        width:100%;
        max-width:none;
        margin:0;
        padding:10px;
        border-radius:14px;
        max-height:82vh;
        overflow:auto;
      }

      .modalTop{
        flex-wrap:wrap;
        gap:8px;
      }

      #gifSearch{
        width:100%;
        flex:1 1 100%;
      }

      #gifResults{
        grid-template-columns:repeat(2,1fr);
        max-height:55vh;
      }

      .emojiPopup{
        left:12px;
        right:12px;
        bottom:84px;
        width:auto;
        max-width:none;
      }

      .emojiGrid{ grid-template-columns:repeat(3,1fr); }
      .emojiBtn{ height:42px; font-size:22px; }

      .btn-row{
        grid-template-columns:auto auto auto 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">

      <div class="chatRule">Be <span>RESPECTFUL</span> to all <span>VIEWERS</span> and <span>DJs</span> or <span>BE BLOCKED</span>.</div>

      <div class="presence">
        <div class="userLine pill">
          User: <b id="userDisplay">...</b>
          <button id="changeName" class="linkBtn" type="button">Change</button>
        </div>

        <div class="presRow">
          <button id="viewerBtn" class="viewerBtn" type="button" aria-haspopup="dialog" aria-controls="viewerModal">
            Web — 👀 <b id="viewCount">0</b>
          </button>

          <span class="pill">💬 Chat — <b id="chatCount">0</b></span>
          <span class="pill">Twitch — 👀 <b id="twViewCount">0</b></span>
        </div>
      </div>

      <div id="chatMessages">
        <div class="msg them">
          <div class="meta">System</div>
          Loading messages…
        </div>
      </div>

      <div class="composer">
        <div id="replyPreview" class="replyPreview" hidden>
          <div class="replyPreviewText">
            <b id="replyToName">Replying</b>
            <span id="replyToSnippet"></span>
          </div>
          <button id="clearReply" class="replyClose" type="button">✕</button>
        </div>

        <input id="messageInput" type="text" placeholder="Type your message…" autocomplete="off" />

        <div class="btn-row">
          <button id="emojiBtn" class="btn" type="button">🙂</button>
          <button id="stickerBtn" class="btn" type="button">Stickers</button>
          <button id="gifBtn" class="btn" type="button">GIF</button>
          <button id="sendBtn" class="btn btnPrimary" type="button">Send</button>
        </div>
      </div>
    </div>
  </div>

  <!-- GIF MODAL -->
  <div id="gifModal">
    <div class="modalBox">
      <div class="modalTop">
        <input id="gifSearch" type="text" placeholder="Search GIFs (press Enter) — or leave blank for Trending" />
        <button id="gifTrending" class="btn" type="button">Trending</button>
        <button id="gifClose" class="btn" type="button">Close</button>
      </div>
      <div class="hint">Tip: Press Enter to search. Click a GIF to send it to chat.</div>
      <div id="gifResults"></div>
    </div>
  </div>

  <!-- STICKERS MODAL -->
  <div id="stickerModal" class="emojiPopup" aria-hidden="true">
    <div class="emojiHead">
      <div class="emojiTitle">Stickers</div>
      <button id="stickerClose" class="emojiClose" type="button">✕</button>
    </div>
    <div class="emojiGrid" id="stickerGrid"></div>
    <div class="emojiHint">Click a sticker to send.</div>
  </div>

  <!-- EMOJI PICKER -->
  <div id="emojiPopup" class="emojiPopup" aria-hidden="true">
    <div class="emojiHead">
      <div class="emojiTitle">Smilies</div>
      <button id="emojiClose" class="emojiClose" type="button">✕</button>
    </div>
    <div class="emojiGrid" id="emojiGrid"></div>
    <div class="emojiHint">Click to insert. Esc to close.</div>
  </div>

  <!-- VIEWERS MODAL -->
  <div id="viewerModal" class="vModal" aria-hidden="true">
    <div class="vBox" role="dialog" aria-modal="true" aria-label="Viewers online">
      <div class="vTop">
        <b>Viewers online</b>
        <button id="viewerClose" class="vClose" type="button">✕</button>
      </div>
      <div id="viewerList" class="vList"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    /* =========================
       CONFIG
    ========================= */
    const SUPABASE_URL = "https://tgqfplueqjhsywkcjaal.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRncWZwbHVlcWpoc3l3a2NqYWFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5ODQ2NTAsImV4cCI6MjA4NTU2MDY1MH0.hBGfeviPVBmhtFBsn3B0GRSC_JXU6qxC3qmW-mbb9-o";

    const ROOM = "ma3dtribe";
    const TWITCH_CLIENT_ID = "ag7cyjkqvjbpx6ql6v4uerk6jzmi2t";
    const GIPHY_API_KEY = "3zxGKg42FRkYfKmUrnjmobhQch37O33L";
    const USER_STORAGE_KEY = "ma3dtribe_username";
    const SESSION_KEY = "ma3dtribe_presence_session";

    let stickers = [];
    let pendingStickers = [];
    let hasChatted = false;
    let presenceChannel = null;
    let latestViewerRows = [];
    const renderedIds = new Set();
    let oldestLoadedTime = null;
    let loadingOlderMessages = false;    
    /* =========================
       ELEMENTS

    const chatMessages = document.getElementById("chatMessages");

    const userDisplay = document.getElementById("userDisplay");
    const changeNameBtn = document.getElementById("changeName");

    const gifBtn = document.getElementById("gifBtn");
    const stickerBtn = document.getElementById("stickerBtn");
    const gifModal = document.getElementById("gifModal");
    const gifClose = document.getElementById("gifClose");
    const gifTrending = document.getElementById("gifTrending");
    const gifSearch = document.getElementById("gifSearch");
    const gifResults = document.getElementById("gifResults");

    const stickerModal = document.getElementById("stickerModal");
    const stickerGrid = document.getElementById("stickerGrid");
    const stickerClose = document.getElementById("stickerClose");

    const emojiBtn = document.getElementById("emojiBtn");
    const emojiPopup = document.getElementById("emojiPopup");
    const emojiGrid = document.getElementById("emojiGrid");
    const emojiClose = document.getElementById("emojiClose");

    const viewCountEl = document.getElementById("viewCount");
    const chatCountEl = document.getElementById("chatCount");

    /* =========================
       USERNAME
    ========================= */
    function getWebsiteUsername() {
      let name = (localStorage.getItem(USER_STORAGE_KEY) || "").trim();
      if (!name) {
        name = (prompt("Enter your website username for chat:") || "").trim();
        if (!name) name = "Guest";
        localStorage.setItem(USER_STORAGE_KEY, name);
      }
      return name;
    }

    function setWebsiteUsername(newName) {
      const clean = (newName || "").trim() || "Guest";
      localStorage.setItem(USER_STORAGE_KEY, clean);
      USERNAME = clean;
      userDisplay.textContent = USERNAME;
    }

    let USERNAME = getWebsiteUsername();
    userDisplay.textContent = USERNAME;

    changeNameBtn.addEventListener("click", () => {
      const newName = prompt("Change your chat name:", USERNAME);
      if (newName !== null) setWebsiteUsername(newName);
      messageInput.focus();
    });

    /* =========================
       SAFE HELPERS
    ========================= */
    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function scrollBottom(){
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function formatChatTime(ts){
      if (!ts) return "";
      let s = String(ts);
      if (!/[zZ]$|[+\-]\d\d:\d\d$/.test(s)) s += "Z";

      const d = new Date(s);
      return new Intl.DateTimeFormat("en-US", {
        timeZone: "America/New_York",
        month: "short",
        day: "2-digit",
        hour: "numeric",
        minute: "2-digit"
      }).format(d).replace(",", "");
    }

    function cleanDisplayText(text){
      let s = String(text || "");
      s = s.replace(/�/g, "");
      s = s.replace(/[\u200B-\u200D\uFEFF]/g, "");
      s = s.replace(/[^\p{L}\p{N}\p{P}\p{Z}\p{Emoji_Presentation}\p{Extended_Pictographic}]/gu, "");
      s = s.replace(/\s+/g, " ").trim();
      return s;
    }

    function shouldHideMessage(text){
      const s = cleanDisplayText(text || "").trim().toLowerCase();
      if (!s) return true;

      const BLOCKED_EMOTE_WORDS = ["sip", "time", "sip time", "pew", "pew pew", "redness"];
      if (BLOCKED_EMOTE_WORDS.includes(s)) return true;

      const parts = s.split(/\s+/).filter(Boolean);
      if (!parts.length) return true;
      if (parts.every(p => BLOCKED_EMOTE_WORDS.includes(p))) return true;

      return false;
    }

    function truncateReplyText(text){
      return String(text || "").replace(/\s+/g, " ").trim().slice(0, 80);
    }

    /* =========================
       REPLY ENCODING
       Stored in normal content field
    ========================= */
    let replyState = null;

    function encodeReplyPayload(replyUser, replyText, bodyText){
      return `[reply:${encodeURIComponent(replyUser || "Guest")}|${encodeURIComponent(replyText || "")}] ${bodyText || ""}`;
    }

    function parseReplyPayload(content){
      const str = String(content || "");
      const match = str.match(/^\[reply:([^|]*?)\|([^\]]*?)\]\s*([\s\S]*)$/);
      if (!match) {
        return {
          replyUser: null,
          replyText: null,
          body: str
        };
      }

      return {
        replyUser: decodeURIComponent(match[1] || ""),
        replyText: decodeURIComponent(match[2] || ""),
        body: match[3] || ""
      };
    }

    function setReply(row, forcedText){
      const parsed = parseReplyPayload(row.content || "");
      const bodyForReply = truncateReplyText(forcedText || parsed.body || row.content || "");

      replyState = {
        id: row.id,
        username: row.username || "Guest",
        text: bodyForReply
      };

      replyToName.textContent = `Replying to ${replyState.username}`;
      replyToSnippet.textContent = replyState.text;
      replyPreview.hidden = false;
      replyPreview.style.display = "flex";
      messageInput.focus();
    }

    function clearReplyState(){
      replyState = null;
      replyPreview.hidden = true;
replyPreview.style.display = "none";      
      replyToName.textContent = "";
      replyToSnippet.textContent = "";
    }

    clearReply.addEventListener("click", clearReplyState);

    /* =========================
       SUPABASE CLIENT
    ========================= */
    function getSbClient(){
      if (!window.supabase) {
        chatMessages.innerHTML = `
          <div class="msg them">
            <div class="meta">System</div>
            Supabase library did not load. Check the script tag.
          </div>`;
        return null;
      }
      return window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    }

    const sb = getSbClient();

    /* =========================
       STICKERS
    ========================= */
    async function loadStickers(){
      if (!sb) return;

      const { data, error } = await sb
        .from("stickers")
        .select("image_url")
        .eq("active", true)
        .order("sort_order", { ascending: true });

      if (error){
        console.error("Sticker load failed:", error);
        return;
      }

      stickers = (data || []).map(row => row.image_url).filter(Boolean);
    }

    /* =========================
       PRESENCE
    ========================= */
    let sessionId = localStorage.getItem(SESSION_KEY);
    if (!sessionId) {
      sessionId = (crypto?.randomUUID?.() || (Date.now() + "-" + Math.random().toString(16).slice(2)));
      localStorage.setItem(SESSION_KEY, sessionId);
    }

    function recomputeCounts(channel){
      if (!channel) return;
      const state = channel.presenceState();

      let viewers = 0;
      let chatters = 0;

      for (const key in state) {
        const metas = state[key] || [];
        viewers += metas.length;
        if (metas.some(m => m?.chatted === true)) chatters += 1;
      }

      if (viewCountEl) viewCountEl.textContent = String(viewers);
      if (chatCountEl) chatCountEl.textContent = String(chatters);

      updateViewersUI(channel);
    }

    async function startPresence(){
      if (!sb) return;

      presenceChannel = sb.channel(`presence:${ROOM}`, {
        config: { presence: { key: sessionId } }
      });

      presenceChannel
        .on("presence", { event: "sync" }, () => recomputeCounts(presenceChannel))
        .on("presence", { event: "join" }, () => recomputeCounts(presenceChannel))
        .on("presence", { event: "leave" }, () => recomputeCounts(presenceChannel));

      await presenceChannel.subscribe(async (status) => {
        if (status !== "SUBSCRIBED") return;

        await presenceChannel.track({
          username: USERNAME || "Guest",
          chatted: false,
          t: Date.now()
        });

        recomputeCounts(presenceChannel);
      });

      window.addEventListener("beforeunload", () => {
        try { presenceChannel?.untrack(); } catch(e) {}
      });
    }

    async function markChatted(){
      if (!presenceChannel || hasChatted) return;
      hasChatted = true;

      await presenceChannel.track({
        username: USERNAME || "Guest",
        chatted: true,
        t: Date.now()
      });

      recomputeCounts(presenceChannel);
    }

    function buildViewerRowsFromPresence(channel){
      const state = channel?.presenceState?.() || {};
      const rows = [];

      for (const key in state){
        const metas = state[key] || [];
        for (const m of metas){
          rows.push({
            name: (m.username || "Guest").toString(),
            chatted: !!m.chatted,
            t: Number(m.t || 0)
          });
        }
      }

      return rows.sort((a,b) => {
        if (a.chatted !== b.chatted) return a.chatted ? -1 : 1;
        return (b.t || 0) - (a.t || 0);
      });
    }

    function renderViewerList(rows){
      if (!viewerList) return;

      if (!rows.length){
        viewerList.innerHTML = `<div style="opacity:.8;padding:8px 2px;">No one is online yet.</div>`;
        return;
      }

      viewerList.innerHTML = rows.map(r => `
        <div class="vItem">
          <div><b>${escapeHtml(r.name)}</b></div>
          <div class="vTag">${r.chatted ? "💬 chatted" : "👀 viewing"}</div>
        </div>
      `).join("");
    }

    function updateViewersUI(channel){
      latestViewerRows = buildViewerRowsFromPresence(channel);
    }

    function openViewerModal(){
      renderViewerList(latestViewerRows);
      viewerModal?.classList.add("show");
      viewerModal?.setAttribute("aria-hidden","false");
    }

    function closeViewerModal(){
      viewerModal?.classList.remove("show");
      viewerModal?.setAttribute("aria-hidden","true");
    }

    viewerBtn?.addEventListener("click", openViewerModal);
    viewerClose?.addEventListener("click", closeViewerModal);
    viewerModal?.addEventListener("click", (e) => {
      if (e.target === viewerModal) closeViewerModal();
    });

    /* =========================
       TWITCH VIEWERS
    ========================= */
    async function refreshTwitchViewers(){
      try {
        const target = "https://decapi.me/twitch/viewercount/ma3dtribe";
        const res = await fetch(
          "https://api.allorigins.win/raw?url=" + encodeURIComponent(target),
          { cache: "no-store" }
        );

        const text = (await res.text()).trim();

        if (/offline/i.test(text)) {
          if (twViewCountEl) twViewCountEl.textContent = "0";
          return;
        }

        const n = parseInt(text.replace(/[^\d]/g, ""), 10);
        if (twViewCountEl) twViewCountEl.textContent = isNaN(n) ? "—" : String(n);
      } catch (e) {
        if (twViewCountEl) twViewCountEl.textContent = "—";
      }
    }

    /* =========================
       RENDER
    ========================= */
    function buildMessageContentNode(row){
      const kind = (row.kind || "").toLowerCase();
      const parsed = parseReplyPayload(row.content || "");
      const rawText = String(parsed.body || "").trim().toLowerCase();

      if (
        kind === "text" &&
        (
          rawText.includes("sip time") ||
          rawText.includes("wowmidnight") ||
          rawText.includes("pew pew") ||
          rawText.includes("redness")
        )
      ) return null;

      if (kind === "text" && shouldHideMessage(parsed.body || "")) return null;

      const frag = document.createDocumentFragment();

      if (parsed.replyUser || parsed.replyText){
        const quote = document.createElement("div");
        quote.className = "replyQuote";
        quote.innerHTML = `<b>${escapeHtml(parsed.replyUser || "Reply")}</b>${escapeHtml(parsed.replyText || "")}`;
        frag.appendChild(quote);
      }

      if (kind === "gif") {
        const img = document.createElement("img");
        img.src = row.content || "";
        img.alt = "gif";
        img.loading = "lazy";
        img.style.maxWidth = "320px";
        frag.appendChild(img);
        return frag;
      }

      if (kind === "sticker") {
        const img = document.createElement("img");
        img.src = row.content || "";
        img.alt = "sticker";
        img.loading = "lazy";
        img.style.maxWidth = "200px";
        frag.appendChild(img);
        return frag;
      }

      const div = document.createElement("div");
      div.className = "msgBody";

      let safe = escapeHtml(String(parsed.body || ""));

      safe = safe.replace(/\[sticker:(.*?)\]/g, (match, url) => {
        return `<img src="${url}" style="max-width:200px;border-radius:10px;margin:4px 0;display:block;">`;
      });

      if (typeof MA3D_TOKEN !== "undefined" && MA3D_TOKEN) {
        safe = safe.replaceAll(
          escapeHtml(MA3D_TOKEN),
          `<span class="ma3dBadge">MA3DTRIBE</span>`
        );
      }

      div.innerHTML = safe;
      frag.appendChild(div);

      return frag;
    }

    function renderRow(row, position = "append"){
  if (row && row.id != null) {
    if (renderedIds.has(row.id)) return null;
    renderedIds.add(row.id);
  }

  const who = (row.username === USERNAME) ? "me" : "them";
  const bubble = document.createElement("div");
  bubble.className = `msg ${who}`;
  bubble.dataset.id = row.id || "";

  const meta = document.createElement("div");
  meta.className = "meta";

  const name = row.username || "Guest";
  const time = formatChatTime(row.created_at) || "";
  meta.innerHTML = time
    ? `<span class="uname">${escapeHtml(name)}</span> · ${escapeHtml(time)}`
    : `<span class="uname">${escapeHtml(name)}</span>`;

  bubble.appendChild(meta);

  const contentNode = buildMessageContentNode(row);
  if (!contentNode) return null;

  bubble.appendChild(contentNode);

  if ((row.kind || "").toLowerCase() === "text") {
    const actions = document.createElement("div");
    actions.className = "msgActions";

    const replyBtn = document.createElement("button");
    replyBtn.className = "msgActionBtn";
    replyBtn.type = "button";
    replyBtn.textContent = "Reply";
    replyBtn.addEventListener("click", () => {
      const parsed = parseReplyPayload(row.content || "");
      setReply(row, parsed.body || row.content || "");
    });
    actions.appendChild(replyBtn);

    ["👍","❤️","😂","🔥"].forEach(emoji => {
      const btn = document.createElement("button");
      btn.className = "msgActionBtn";
      btn.type = "button";
      btn.textContent = emoji;
      btn.addEventListener("click", async () => {
        setReply(row, parseReplyPayload(row.content || "").body || row.content || "");
        messageInput.value = emoji;
        await sendText();
      });
      actions.appendChild(btn);
    });

    bubble.appendChild(actions);
  }

  if (position === "prepend") {
    chatMessages.insertBefore(bubble, chatMessages.firstChild);
  } else {
    chatMessages.appendChild(bubble);
  }

  return bubble;
}

    /* =========================
       LOAD + REALTIME
    ========================= */
async function loadInitial(){
  if (!sb) return;

  const { data, error } = await sb
    .from("messages")
    .select("id, room, username, kind, content, created_at")
    .eq("room", ROOM)
    .not("created_at", "is", null)
    .order("created_at", { ascending: false, nullsFirst: false })
    .limit(60);

  if (error){
    console.error("SELECT error:", error);
    chatMessages.innerHTML = `
      <div class="msg them">
        <div class="meta">System</div>
        Read failed: ${escapeHtml(error.message)}
      </div>`;
    return;
  }

  chatMessages.innerHTML = "";
  renderedIds.clear();

  if (!data || !data.length){
    chatMessages.innerHTML = `
      <div class="msg them">
        <div class="meta">System</div>
        No messages yet. Say something.
      </div>`;
    return;
  }

  oldestLoadedTime = data[data.length - 1]?.created_at || null;

data.reverse().forEach(row => renderRow(row));

  setTimeout(() => {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }, 50);
}


async function loadOlderMessages(){
  if (!sb || !oldestLoadedTime || loadingOlderMessages) return;

  loadingOlderMessages = true;

  const { data, error } = await sb
    .from("messages")
    .select("id, room, username, kind, content, created_at")
    .eq("room", ROOM)
    .not("created_at", "is", null)
    .lt("created_at", oldestLoadedTime)
    .order("created_at", { ascending: false })
    .limit(60);

  if (error || !data?.length) {
    loadingOlderMessages = false;
    return;
  }

  oldestLoadedTime = data[data.length - 1]?.created_at || oldestLoadedTime;

  const prevHeight = chatMessages.scrollHeight;

  data.forEach(row => {
    renderRow(row, "prepend");
  });

  chatMessages.scrollTop = chatMessages.scrollHeight - prevHeight;

  loadingOlderMessages = false;
}
    
function subscribeRealtime(){
  if (!sb) return;

  sb.channel("room-" + ROOM)
    .on(
      "postgres_changes",
      { event: "INSERT", schema: "public", table: "messages", filter: `room=eq.${ROOM}` },
      (payload) => {
        if (!payload || !payload.new) return;

        if (renderedIds.has(payload.new.id)) return;

        const nearBottom =
          chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight < 120;

        renderRow(payload.new);

        if (nearBottom) {
          setTimeout(() => {
            chatMessages.scrollTop = chatMessages.scrollHeight;
          }, 20);
        }
      }
    )
    .subscribe((status) => console.log("realtime:", status));
}

    /* =========================
       SEND TEXT
    ========================= */
    const BANNED_WORDS = ["fuck", "shit", "bitch", "asshole", "nigger", "faggot"];

    function containsProfanity(text){
      const t = String(text || "").toLowerCase();
      return BANNED_WORDS.some(word => t.includes(word));
    }

    async function sendText(){
      if (!sb) return;

      const rawText = (messageInput.value || "").trim();
      const stickerMatches = (messageInput.value.match(/\[sticker\]/g) || []).length;

      if (!rawText && !stickerMatches) return;

      if (containsProfanity(rawText)){
        alert("Please keep the chat respectful.");
        return;
      }

      let contentToSend = rawText;

      if (stickerMatches && pendingStickers.length){
        let i = 0;
        contentToSend = rawText.replace(/\[sticker\]/g, () => {
          const url = pendingStickers[i++] || "";
          return `[sticker:${url}]`;
        });
      }

      if (replyState){
        contentToSend = encodeReplyPayload(replyState.username, replyState.text, contentToSend);
      }

      const { error } = await sb.from("messages").insert({
        room: ROOM,
        username: USERNAME,
        kind: "text",
        content: contentToSend,
        source: "web",
        created_at: new Date().toISOString()
      });

      if (error){
        alert("Save failed: " + error.message);
      } else {
        messageInput.value = "";
        pendingStickers = [];
        clearReplyState();
        markChatted();
        messageInput.focus();
      }
    }

    sendBtn.addEventListener("click", sendText);
    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendText();
    });

    /* =========================
       GIFS
    ========================= */
    function openGifModal() {
      gifModal.classList.add("show");
      gifSearch.value = "";
      gifResults.textContent = "Loading trending GIFs...";
      loadTrending();
    }

    function closeGifModal() {
      gifModal.classList.remove("show");
      messageInput.focus();
    }

    gifBtn.addEventListener("click", openGifModal);
    gifClose.addEventListener("click", closeGifModal);
    gifTrending.addEventListener("click", loadTrending);

    gifModal.addEventListener("click", (e) => {
      if (e.target === gifModal) closeGifModal();
    });

    async function sendGif(url){
      if (!sb) return;

      const { error } = await sb.from("messages").insert({
        room: ROOM,
        username: USERNAME,
        kind: "gif",
        content: url,
        source: "web",
        created_at: new Date().toISOString()
      });

      if (error){
        alert("GIF send failed: " + error.message);
      } else {
        markChatted();
        closeGifModal();
      }
    }

    async function loadTrending() {
      gifResults.textContent = "Loading trending GIFs...";
      try {
        const url = `https://api.giphy.com/v1/gifs/trending?api_key=${encodeURIComponent(GIPHY_API_KEY)}&limit=18&rating=pg-13`;
        const res = await fetch(url);
        const json = await res.json();

        if (!res.ok) {
          gifResults.textContent = "GIPHY error";
          return;
        }
        renderGifGrid(json.data || []);
      } catch (err) {
        gifResults.textContent = "Network error: " + err.message;
      }
    }

    gifSearch.addEventListener("keydown", async (e) => {
      if (e.key !== "Enter") return;

      const q = gifSearch.value.trim();
      if (!q) return loadTrending();

      gifResults.textContent = "Searching...";
      try {
        const url = `https://api.giphy.com/v1/gifs/search?api_key=${encodeURIComponent(GIPHY_API_KEY)}&q=${encodeURIComponent(q)}&limit=18&rating=pg-13`;
        const res = await fetch(url);
        const json = await res.json();

        if (!res.ok) {
          gifResults.textContent = "GIPHY error";
          return;
        }

        renderGifGrid(json.data || []);
      } catch (err) {
        gifResults.textContent = "Network error: " + err.message;
      }
    });

    function renderGifGrid(gifs) {
      gifResults.innerHTML = "";
      gifs.forEach(g => {
        const imgUrl = g?.images?.fixed_width?.url;
        if (!imgUrl) return;

        const img = document.createElement("img");
        img.src = imgUrl;
        img.loading = "lazy";
        img.addEventListener("click", () => sendGif(imgUrl));
        gifResults.appendChild(img);
      });
    }

    /* =========================
       STICKERS
    ========================= */
    async function sendSticker(url){
      if (!sb) return;

      const { error } = await sb.from("messages").insert({
        room: ROOM,
        username: USERNAME,
        kind: "sticker",
        content: url,
        source: "web",
        created_at: new Date().toISOString()
      });

      if (error){
        alert("Sticker send failed: " + error.message);
      } else {
        markChatted();
        closeStickers();
      }
    }

    async function openStickers(){
      if (!stickerModal || !stickerGrid) return;

      stickerGrid.innerHTML = "<div style='grid-column:1/-1;opacity:.8;'>Loading stickers...</div>";
      await loadStickers();
      stickerGrid.innerHTML = "";

      if (!stickers.length){
        stickerGrid.innerHTML = "<div style='grid-column:1/-1;opacity:.8;'>No stickers available.</div>";
        stickerModal.classList.add("show");
        stickerModal.setAttribute("aria-hidden", "false");
        return;
      }

      stickers.forEach(src => {
        const img = document.createElement("img");
        img.src = src;
        img.loading = "lazy";
        img.style.width = "170px";
        img.style.height = "170px";
        img.style.objectFit = "contain";
        img.style.cursor = "pointer";

        img.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();

          pendingStickers.push(src);
          insertAtCursor(messageInput, " [sticker] ");
          closeStickers();
        });

        stickerGrid.appendChild(img);
      });

      stickerModal.classList.add("show");
      stickerModal.setAttribute("aria-hidden", "false");
    }

    function closeStickers(){
      if (!stickerModal) return;
      stickerModal.classList.remove("show");
      stickerModal.setAttribute("aria-hidden", "true");
      messageInput.focus();
    }

    /* =========================
       EMOJI
    ========================= */
    const EMOJIS = [
      "😀","😄","😁","😆","😂","🤣","😊","🙂",
      "😉","😎","😍","😘","😜","🤪","😅","🤝",
      "🙏","👏","🔥","💯","🎶","🎧","✅","❤️",
      "🎤","🎛️","💿","🪩","🌍","🏆","🚀","👀","🙌","🥳"
    ];

    const MA3D_TOKEN = ":ma3d:";

    function insertAtCursor(input, text){
      const start = input.selectionStart ?? input.value.length;
      const end = input.selectionEnd ?? input.value.length;
      const before = input.value.slice(0, start);
      const after = input.value.slice(end);
      input.value = before + text + after;
      const pos = start + text.length;
      input.setSelectionRange(pos, pos);
      input.focus();
    }

    function openEmoji(){
      if (!emojiPopup) return;
      emojiPopup.classList.add("show");
      emojiPopup.setAttribute("aria-hidden", "false");
    }

    function closeEmoji(){
      if (!emojiPopup) return;
      emojiPopup.classList.remove("show");
      emojiPopup.setAttribute("aria-hidden", "true");
      messageInput.focus();
    }

    function buildEmojiGrid(){
      if (!emojiGrid) return;
      emojiGrid.innerHTML = "";

      const ma3dBtn = document.createElement("button");
      ma3dBtn.type = "button";
      ma3dBtn.className = "emojiBtn";
      ma3dBtn.title = "Ma3DTribe";
      ma3dBtn.textContent = "MA3D";
      ma3dBtn.addEventListener("click", () => {
        insertAtCursor(messageInput, ` ${MA3D_TOKEN} `);
        closeEmoji();
      });
      emojiGrid.appendChild(ma3dBtn);

      EMOJIS.forEach(e => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "emojiBtn";
        b.textContent = e;
        b.addEventListener("click", () => {
          insertAtCursor(messageInput, e);
          closeEmoji();
        });
        emojiGrid.appendChild(b);
      });
    }

    buildEmojiGrid();

    emojiBtn.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (emojiPopup.classList.contains("show")) closeEmoji();
      else openEmoji();
    });

    stickerBtn.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (stickerModal.classList.contains("show")) closeStickers();
      else openStickers();
    });

    emojiClose.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      closeEmoji();
    });

    stickerClose.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      closeStickers();
    });

    document.addEventListener("click", (e) => {
      if (emojiPopup.classList.contains("show")) {
        if (!emojiPopup.contains(e.target) && !emojiBtn.contains(e.target)) closeEmoji();
      }

      if (stickerModal.classList.contains("show")) {
        if (!stickerModal.contains(e.target) && !stickerBtn.contains(e.target)) closeStickers();
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeEmoji();
        closeStickers();
        closeGifModal();
        closeViewerModal();
      }
    });
chatMessages.addEventListener("scroll", () => {
  if (chatMessages.scrollTop < 120) {
    loadOlderMessages();
  }
});
    
    /* =========================
       START
    ========================= */
    window.addEventListener("load", async () => {
      try { messageInput && messageInput.focus(); } catch(e) {}

      try { await loadInitial(); } catch(e) { console.error("loadInitial failed", e); }
      try { subscribeRealtime(); } catch(e) { console.error("subscribeRealtime failed", e); }
      try { startPresence(); } catch(e) { console.error("startPresence failed", e); }

      try { refreshTwitchViewers(); } catch(e) { console.error("refreshTwitchViewers failed", e); }
      setInterval(() => {
        try { refreshTwitchViewers(); } catch(e) { console.error("refreshTwitchViewers interval failed", e); }
      }, 30000);
    });
  </script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MA3DTribe Stats</title>

  <style>
    body{
      background:#050505;
      color:white;
      font-family:Arial;
      padding:20px;
    }

    h1{
      color:#ff9500;
    }

    .card{
      background:#111;
      border-radius:14px;
      padding:20px;
      margin-bottom:20px;
    }

.dashboard-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
  gap:16px;
  margin-top:20px;
}

.stat-card{
  background:#151515;
  border:1px solid rgba(255,255,255,.12);
  border-radius:16px;
  padding:18px;
}

.stat-label{
  color:#aaa;
  font-size:13px;
  margin-bottom:8px;
}

.stat-number{
  font-size:34px;
  font-weight:bold;
  color:#ff9500;
}    

.summary-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
  gap:16px;
  margin-top:24px;
}

.summary-card{
  background:#151515;
  border:1px solid rgba(255,149,0,.25);
  border-radius:16px;
  padding:18px;
  line-height:1.8;
}

.summary-card h3{
  margin-top:0;
  color:#ff9500;
}    
    button{
      background:#ff9500;
      color:black;
      border:none;
      padding:14px 20px;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h1>MA3DTribe Analytics</h1>

<div class="card">
  <h2>Manual Twitch Pull</h2>

  <button onclick="pullTwitchStats()">
    Pull Twitch Stats
  </button>

  <p id="status"></p>
<div class="dashboard-grid">

  <div class="stat-card">
    <div class="stat-label">Website Visits</div>
    <div class="stat-number" id="siteTotal">0</div>
  </div>

  <div class="stat-card">
    <div class="stat-label">Audio Plays</div>
    <div class="stat-number" id="audioTotal">0</div>
  </div>

  <div class="stat-card">
    <div class="stat-label">Twitch Viewers</div>
    <div class="stat-number" id="twitchTotal">0</div>
  </div>

</div>

<div class="summary-grid">

  <div class="summary-card">
    <h3>Today</h3>
    <div id="todayBox"></div>
  </div>

  <div class="summary-card">
    <h3>Last 7 Days</h3>
    <div id="weekBox"></div>
  </div>

</div> 
<p>
  <button onclick="loadDashboardStats()">
    Refresh Dashboard Totals
  </button>
</p>

<p id="lastUpdated" style="color:#aaa; font-size:13px;"></p>  
</div>

<script>
async function pullTwitchStats(){

  document.getElementById("status").innerText =
    "Pulling Twitch stats...";

  try {

    const response = await fetch(
      "/.netlify/functions/twitch-stats"
    );

    const data = await response.json();

    document.getElementById("status").innerText =
      "Success. Twitch viewers: " + data.viewers;

  } catch(err){

    document.getElementById("status").innerText =
      "Error pulling stats.";

  }
}

async function loadDashboardStats(){

  const siteResponse = await fetch(
    "https://tgqfplueqjhsywkcjaal.supabase.co/rest/v1/site_stats?select=*",
    {
      headers:{
        apikey:"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRncWZwbHVlcWpoc3l3a2NqYWFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5ODQ2NTAsImV4cCI6MjA4NTU2MDY1MH0.hBGfeviPVBmhtFBsn3B0GRSC_JXU6qxC3qmW-mbb9-o"
      }
    }
  );

  const audioResponse = await fetch(
    "https://tgqfplueqjhsywkcjaal.supabase.co/rest/v1/audio_stats?select=*",
    {
      headers:{
        apikey:"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRncWZwbHVlcWpoc3l3a2NqYWFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5ODQ2NTAsImV4cCI6MjA4NTU2MDY1MH0.hBGfeviPVBmhtFBsn3B0GRSC_JXU6qxC3qmW-mbb9-o"
      }
    }
  );

  const twitchResponse = await fetch(
    "https://tgqfplueqjhsywkcjaal.supabase.co/rest/v1/twitch_stats?select=*",
    {
      headers:{
        apikey:"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRncWZwbHVlcWpoc3l3a2NqYWFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5ODQ2NTAsImV4cCI6MjA4NTU2MDY1MH0.hBGfeviPVBmhtFBsn3B0GRSC_JXU6qxC3qmW-mbb9-o"
      }
    }
  );

  const siteData = await siteResponse.json();
  const audioData = await audioResponse.json();
  const twitchData = await twitchResponse.json();

document.getElementById("siteTotal").innerText =
  siteData.length;

document.getElementById("audioTotal").innerText =
  audioData.length;

document.getElementById("twitchTotal").innerText =
  twitchData.length;  
    const today = new Date().toISOString().split("T")[0];

const todaySite = siteData.filter(
  x => x.created_at.startsWith(today)
);

const todayAudio = audioData.filter(
  x => x.created_at.startsWith(today)
);

const todayTwitch = twitchData.filter(
  x => x.created_at.startsWith(today)
);

document.getElementById("todayBox").innerHTML =
  "Website Visits: " + todaySite.length + "<br>" +
  "Audio Plays: " + todayAudio.length + "<br>" +
  "Twitch Views: " + todayTwitch.length;

const sevenDaysAgo = new Date();
sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

const weekSite = siteData.filter(
  x => new Date(x.created_at) >= sevenDaysAgo
);

const weekAudio = audioData.filter(
  x => new Date(x.created_at) >= sevenDaysAgo
);

const weekTwitch = twitchData.filter(
  x => new Date(x.created_at) >= sevenDaysAgo
);

document.getElementById("weekBox").innerHTML =
  "Website Visits: " + weekSite.length + "<br>" +
  "Audio Plays: " + weekAudio.length + "<br>" +
  "Twitch Views: " + weekTwitch.length;  
document.getElementById("lastUpdated").innerText =
  "Last Updated: " +
  new Date().toLocaleString("en-US", {
    timeZone: "America/New_York"
  });  
}
  window.onload = () => {
  loadDashboardStats();
}; 
</script>

<div class="card">
  <h2>Quick Links</h2>

  <p>
    <a href="https://ma3dtribe.com"
       style="color:#ff9500;">
       Main Site
    </a>
  </p>
</div>  
</body>
</html>

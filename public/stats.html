<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MA3DTribe Stats</title>

  <style>
    body{
      background:#050505;

    }

    h1{
      color:#ff9500;

    .card{
      background:#111;

    }

    button{

<body>

<h1>MA3DTribe Analytics</h1>

<div class="card">
  <h2>Manual Twitch Pull</h2>

  <button onclick="pullTwitchStats()">
    Pull Twitch Stats
  </button>

  <p id="status"></p>
<div id="totalsBox" style="margin-top:15px; line-height:1.8;"></div>

<div id="todayBox" style="margin-top:15px; line-height:1.8;"></div>  
<p>
  <button onclick="loadDashboardStats()">
    Refresh Dashboard Totals
  </button>
</p>
  
</div>

<script>
async function pullTwitchStats(){

  document.getElementById("status").innerText =
    "Pulling Twitch stats...";

  try {

    const response = await fetch(
      "/.netlify/functions/twitch-stats"
    );

    const data = await response.json();

    document.getElementById("status").innerText =
      "Success. Twitch viewers: " + data.viewers;

  } catch(err){

    document.getElementById("status").innerText =
      "Error pulling stats.";

  }
}

    {

    {
      headers:{
        apikey:"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRncWZwbHVlcWpoc3l3a2NqYWFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5ODQ2NTAsImV4cCI6MjA4NTU2MDY1MH0.hBGfeviPVBmhtFBsn3B0GRSC_JXU6qxC3qmW-mbb9-o"

    {

  const siteData = await siteResponse.json();

  const twitchData = await twitchResponse.json();

document.getElementById("totalsBox").innerHTML =

  "<strong>Audio Plays:</strong> " + audioData.length + "<br>" +
  "<strong>Twitch Pulls:</strong> " + twitchData.length;  
    const today = new Date().toISOString().split("T")[0];

const todaySite = siteData.filter(
